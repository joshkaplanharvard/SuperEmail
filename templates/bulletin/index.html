{% extends "base.html" %}
{% block title %}Bulletin Board Email{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/bulletin.css') }}">
{% endblock %}

{% block content %}
<div class="bulletin-container">
    <!-- Toolbar -->
    <div class="bulletin-toolbar">
        <h1 class="bulletin-title">📌 Emails</h1>
        <div class="toolbar-actions">
            <input type="text" id="search-input" placeholder="Search emails…" class="search-box">
            <button id="refresh-btn" class="btn btn-secondary" onclick="loadEmails()">↻ Refresh</button>
            <button id="compose-btn" class="btn btn-primary" onclick="openComposer()">＋ New Note</button>
        </div>
    </div>

    <!-- Category columns / board -->
    <div class="board" id="board">
        <!-- Columns generated by JS -->
        <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <p>Loading your bulletin board…</p>
        </div>
    </div>
</div>

<!-- Card detail modal -->
<div class="modal-overlay" id="card-modal" style="display:none;">
    <div class="modal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-header">
            <h2 id="modal-subject"></h2>
            <div class="modal-meta" id="modal-meta"></div>
            <div class="modal-actions" id="modal-actions">
                <button class="btn btn-icon" onclick="markThreadUnread()" title="Mark as unread">✉ Mark Unread</button>
                <button class="btn btn-icon btn-danger" onclick="deleteThread()" title="Delete">🗑 Delete</button>
            </div>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-reply">
            <div class="reply-recipients" id="modal-reply-recipients"></div>
            <div class="reply-mode-toggle">
                <button class="btn btn-icon reply-mode-btn active" id="btn-reply" onclick="setReplyMode('reply')">↩ Reply</button>
                <button class="btn btn-icon reply-mode-btn" id="btn-reply-all" onclick="setReplyMode('reply-all')">↩↩ Reply All</button>
            </div>
            <textarea id="modal-reply-text" placeholder="Write a reply…" rows="3"></textarea>
            <button class="btn btn-primary" onclick="sendReply()">Send</button>
        </div>
    </div>
</div>

<!-- Compose modal -->
<div class="modal-overlay" id="compose-modal" style="display:none;">
    <div class="modal">
        <button class="modal-close" onclick="closeComposer()">&times;</button>
        <h2>📝 New Note</h2>
        <div class="compose-form">
            <input type="email" id="compose-to" placeholder="To (email address)" class="compose-input">
            <input type="text" id="compose-subject" placeholder="Subject / Topic" class="compose-input">
            <textarea id="compose-body" placeholder="Write your note…" rows="6" class="compose-input"></textarea>
            <button class="btn btn-primary" onclick="sendNote()">Send</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/bulletin.js') }}"></script>
{% endblock %}
